<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Принц Миша | Кофейный Дом</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f9f7f4; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Unbounded', sans-serif; }

        /* --- АНИМАЦИИ --- */
        
        /* Плавное появление */
        @keyframes reveal {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .reveal { animation: reveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Покачивание кнопки (Floating) */
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-10px) rotate(1deg); }
        }
        .animate-float { animation: float 3s ease-in-out infinite; }

        /* Неокубизм эффект */
        .neo-card {
            border: 3px solid #000;
            box-shadow: 8px 8px 0px #000;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .neo-card:hover {
            transform: translate(-4px, -4px);
            box-shadow: 14px 14px 0px #000;
        }

        /* Стекломорфизм */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        /* Анимация иконок при наведении на строку меню */
        .menu-item:hover .icon-box {
            transform: scale(1.2) rotate(5deg);
            background-color: #fbbf24; /* amber-400 */
        }
        .icon-box { transition: all 0.3s ease; }
    </style>
</head>
<body class="text-stone-900">

    <header class="relative h-screen flex items-center justify-center p-6 overflow-hidden">
        <img src="hero.jpg" alt="Принц Миша" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0 bg-black/30"></div>

        <div class="relative glass-panel p-10 md:p-16 rounded-[40px] max-w-3xl w-full text-center reveal neo-card">
            <h1 class="text-5xl md:text-7xl font-bold uppercase mb-4 tracking-tighter">Принц Миша</h1>
            <p class="text-sm md:text-base tracking-[0.4em] uppercase font-bold text-amber-800 mb-8 italic">Coffee House & Kids Project</p>
            <a href="#menu" class="inline-block bg-black text-white px-10 py-5 rounded-2xl font-bold hover:bg-amber-700 transition-transform active:scale-95">
                ОТКРЫТЬ МЕНЮ
            </a>
        </div>
    </header>

    <section id="menu" class="py-24 px-6 max-w-6xl mx-auto">
        <div class="text-center mb-20 reveal">
            <h2 class="text-3xl md:text-5xl uppercase font-black mb-2 tracking-tight">Карта меню</h2>
            <div class="h-2 w-24 bg-amber-500 mx-auto rounded-full"></div>
        </div>

        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-12">
            
            <div class="neo-card bg-white p-8 rounded-3xl reveal" style="animation-delay: 0.1s;">
                <div class="flex items-center gap-4 mb-10">
                    <div class="p-3 bg-stone-900 text-white rounded-xl"><i data-lucide="coffee"></i></div>
                    <h3 class="text-2xl font-black italic">КОФЕ</h3>
                </div>
                <ul class="space-y-8">
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-stone-100 rounded-xl flex items-center justify-center shrink-0"><i data-lucide="cup-soda" class="w-5 text-stone-600"></i></div>
                        <div class="flex-grow">
                            <div class="flex justify-between font-bold text-lg border-b-2 border-stone-100 pb-1"><span>Латте</span> <span>20₽</span></div>
                        </div>
                    </li>
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-stone-100 rounded-xl flex items-center justify-center shrink-0"><i data-lucide="waves" class="w-5 text-stone-600"></i></div>
                        <div class="flex-grow">
                            <div class="flex justify-between font-bold text-lg border-b-2 border-stone-100 pb-1"><span>Капучино</span> <span>20₽</span></div>
                        </div>
                    </li>
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-stone-100 rounded-xl flex items-center justify-center shrink-0"><i data-lucide="zap" class="w-5 text-stone-600"></i></div>
                        <div class="flex-grow">
                            <div class="flex justify-between font-bold text-lg border-b-2 border-stone-100 pb-1"><span>Эспрессо</span> <span>20₽</span></div>
                        </div>
                    </li>
                </ul>
            </div>

            <div class="neo-card bg-blue-50 p-8 rounded-3xl reveal" style="animation-delay: 0.2s;">
                <div class="flex items-center gap-4 mb-10">
                    <div class="p-3 bg-blue-600 text-white rounded-xl"><i data-lucide="beaker"></i></div>
                    <h3 class="text-2xl font-black italic text-blue-900">DRINKS</h3>
                </div>
                <ul class="space-y-8">
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-white rounded-xl flex items-center justify-center shrink-0"><i data-lucide="ice-cream" class="w-5 text-blue-500"></i></div>
                        <div class="flex-grow"><div class="flex justify-between font-bold text-lg border-b-2 border-blue-100 pb-1 text-blue-900"><span>Сок + лёд</span> <span>30₽</span></div></div>
                    </li>
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-white rounded-xl flex items-center justify-center shrink-0"><i data-lucide="citrus" class="w-5 text-yellow-500"></i></div>
                        <div class="flex-grow"><div class="flex justify-between font-bold text-lg border-b-2 border-blue-100 pb-1 text-blue-900"><span>Лимонад</span> <span>20₽</span></div></div>
                    </li>
                </ul>
            </div>

            <div class="neo-card bg-amber-50 p-8 rounded-3xl reveal lg:col-span-1 md:col-span-2" style="animation-delay: 0.3s;">
                <div class="flex items-center gap-4 mb-10">
                    <div class="p-3 bg-orange-500 text-white rounded-xl"><i data-lucide="utensils"></i></div>
                    <h3 class="text-2xl font-black italic text-orange-900">FOOD</h3>
                </div>
                <ul class="space-y-8">
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-white rounded-xl flex items-center justify-center shrink-0"><i data-lucide="egg" class="w-5 text-orange-600"></i></div>
                        <div class="flex-grow">
                            <div class="flex justify-between font-bold text-lg border-b-2 border-orange-100 pb-1 text-orange-900"><span>Глазунья</span> <span>20₽</span></div>
                        </div>
                    </li>
                    <li class="menu-item flex items-center gap-4 cursor-default">
                        <div class="icon-box w-12 h-12 bg-white rounded-xl flex items-center justify-center shrink-0"><i data-lucide="layers" class="w-5 text-orange-600"></i></div>
                        <div class="flex-grow">
                            <div class="flex justify-between font-bold text-lg border-b-2 border-orange-100 pb-1 text-orange-900"><span>Сандвич</span> <span>30₽</span></div>
                        </div>
                    </li>
                </ul>
            </div>

        </div>
    </section>

    <section class="py-32 bg-stone-900 text-white text-center relative overflow-hidden">
        <div class="absolute top-10 left-10 w-32 h-32 border-4 border-white/5 rotate-45 animate-float"></div>
        
        <div class="relative z-10 px-6">
            <h2 class="text-2xl md:text-4xl font-bold mb-12 uppercase tracking-tighter">Доверьтесь случаю</h2>
            <button onclick="getPrediction()" class="animate-float neo-card bg-white text-black px-12 py-6 rounded-2xl font-black text-xl hover:bg-amber-400 transition-colors">
                ЧТО МНЕ КУПИТЬ?
            </button>
            <div id="res-box" class="mt-16 h-20 opacity-0 transition-all duration-500 transform translate-y-4">
                <p id="res-text" class="text-3xl md:text-5xl font-black text-amber-400 italic uppercase"></p>
            </div>
        </div>
    </section>

    <footer class="py-12 text-center text-stone-400 text-xs font-bold tracking-[0.5em] uppercase">
        Prince Misha © 2026 / Local Coffee House
    </footer>

    <script>
        // Инициализация иконок
        lucide.createIcons();

        function getPrediction() {
            const options = ["Латте!", "Капучино!", "Сок со льдом!", "Сандвич!", "Эспрессо!", "Лимонад!"];
            const pick = options[Math.floor(Math.random() * options.length)];
            const box = document.getElementById('res-box');
            const text = document.getElementById('res-text');
            
            box.classList.remove('opacity-100', 'translate-y-0');
            box.classList.add('opacity-0', 'translate-y-4');
            
            setTimeout(() => {
                text.innerText = pick;
                box.classList.remove('opacity-0', 'translate-y-4');
                box.classList.add('opacity-100', 'translate-y-0');
            }, 300);
        }

        // Простая анимация появления при скролле
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('reveal');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('section').forEach(section => observer.observe(section));
    </script>
</body>
</html>
